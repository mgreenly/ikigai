# sites — path-routed service location FRAGMENT (NOT a vhost).
#
# Per docs/path-routing-architecture.md the dashboard owns the apex server block,
# the single TLS cert, and the /_authn introspection hook. A service owns nothing
# global: opsctl setup drops this file at /etc/nginx/conf.d/locations/sites.conf,
# which the dashboard's apex server block includes. No server{}, no cert, no listen.
#
# MOUNT is literal from etc/manifest.env (MOUNT=/srv/sites/); PORT is templated
# as __PORT__ and substituted from etc/manifest.env (PORT=3010) at install time
# (opsctl setup on the box, nginx/run in dev) — matching the dashboard fragment.
#
# sites serves FIVE kinds of route under its mount:
#   - the unauthenticated RFC 9728 PRM doc (bootstrap, no token),
#   - the bearer-authenticated MCP endpoint (north/south, via /_authn),
#   - the browser-session gated landing root, proxied to the sites process,
#   - a public static tier (no auth), served from disk,
#   - a private static tier (browser-session gated, via /_session-authn).

# Unauthenticated PRM bootstrap — NO auth_request. An MCP client with no token
# yet must be able to fetch this RFC 9728 doc to discover the AS. The exact-match
# `=` location wins over the `/srv/sites/` tier prefixes below regardless of
# order, so this one path stays open while the MCP endpoint is gated.
location = /srv/sites/.well-known/oauth-protected-resource {
    proxy_pass http://127.0.0.1:__PORT__/.well-known/oauth-protected-resource;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Authenticated MCP endpoint. EXACT-match (`=`) so the static tier prefix
# locations (/srv/sites/public/, /srv/sites/private/) can never shadow it.
# Goes through auth_request to the dashboard's bearer introspection hook.
location = /srv/sites/mcp {
    auth_request /_authn;
    auth_request_set $sites_owner  $upstream_http_x_owner_email;
    auth_request_set $sites_client $upstream_http_x_client_id;

    # Rate limiting: the introspection endpoint returns 429 when a token is over
    # budget, but auth_request only understands 2xx (allow) and 401/403 (deny) —
    # every other subrequest status, 429 included, is collapsed into a synthetic
    # 500. Capture the real subrequest status (and its Retry-After) and intercept
    # that 500 below to re-emit a faithful 429. error_page only catches
    # nginx-internal 500s (proxy_intercept_errors is off), so a genuine 500 from
    # the sites upstream still passes through untouched.
    auth_request_set $authn_status $upstream_status;
    auth_request_set $authn_retry  $upstream_http_retry_after;
    error_page 500 = @sites_authn_500;

    # Identity hygiene: `proxy_set_header X-Owner-Email $sites_owner;` REPLACES the
    # client's inbound X-Owner-Email entirely on the upstream request. nginx does
    # NOT pass inbound client headers as proxy headers unless explicitly set, and
    # the last proxy_set_header for a name wins. So a single set from the auth
    # subrequest variable is sufficient and safe — a client cannot smuggle
    # identity through.
    proxy_set_header X-Owner-Email $sites_owner;
    proxy_set_header X-Client-Id  $sites_client;

    proxy_pass http://127.0.0.1:__PORT__/mcp;   # exact path; upstream serves /mcp
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Landing page — human web UI, gated by the dashboard browser SESSION (cookie),
# validated by the dashboard-owned /_session-authn internal location. Exact-match
# `=` carves out only the bare mount root and leaves the public/private static
# prefixes and the exact MCP endpoint alongside it.
location = /srv/sites/ {
    auth_request /_session-authn;
    auth_request_set $sites_session_owner $upstream_http_x_owner_email;
    proxy_set_header X-Owner-Email $sites_session_owner;

    proxy_pass http://127.0.0.1:__PORT__/;   # trailing slash; upstream sees /
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Public static tier — NO auth. Served directly from disk by nginx (not proxied).
# alias maps the location prefix onto the served public dir; both end in `/` so
# the suffix after /srv/sites/public/ is appended to the alias dir. A directory
# with no index.html yields 403 (autoindex off) — documented, acceptable.
location /srv/sites/public/ {
    alias /opt/sites/www/served/public/;
    autoindex off;
    index index.html;
}

# Private static tier — gated by the owner's dashboard browser SESSION (cookie),
# validated by the dashboard-owned /_session-authn internal location (a sibling
# of /_authn). A failed session check yields 401. Served from disk like the
# public tier once the session is allowed.
location /srv/sites/private/ {
    auth_request /_session-authn;

    alias /opt/sites/www/served/private/;
    autoindex off;
    index index.html;
}

# Reached only when auth_request collapsed a non-allow/deny subrequest status to
# 500. If the introspection endpoint actually said 429 (rate limited), surface
# that faithfully with its Retry-After; otherwise it was a real internal error.
location @sites_authn_500 {
    if ($authn_status = 429) {
        add_header Retry-After $authn_retry always;
        return 429;
    }
    return 500;
}
