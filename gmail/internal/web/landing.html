<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Service}} service</title>
  <link rel="stylesheet" href="/srv/gmail/static/tokens.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: var(--text-body-size);
      line-height: var(--text-body-lh);
    }

    main {
      width: min(100%, var(--layout-max-width));
      min-height: 100vh;
      margin: 0 auto;
      padding: var(--space-16) var(--layout-gutter);
      display: grid;
      align-content: center;
      gap: var(--space-8);
    }

    .eyebrow {
      margin: 0;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
      font-size: var(--text-label-size);
      font-weight: var(--text-label-weight);
      line-height: var(--text-label-lh);
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--text-display-size);
      font-weight: var(--text-display-weight);
      line-height: var(--text-display-lh);
      letter-spacing: 0;
    }

    .summary {
      max-width: 620px;
      margin: 0;
      color: var(--color-text-muted);
      font-size: var(--text-body-lg-size);
      line-height: var(--text-body-lg-lh);
    }

    dl {
      width: min(100%, 420px);
      margin: 0;
      border-top: var(--border-width) solid var(--color-border);
    }

    .meta-row {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: var(--space-4);
      padding: var(--space-4) 0;
      border-bottom: var(--border-width) solid var(--color-border);
    }

    dt {
      color: var(--color-text-muted);
      font-family: var(--font-mono);
      font-size: var(--text-label-size);
      font-weight: var(--text-label-weight);
      line-height: var(--text-label-lh);
    }

    dd {
      margin: 0;
      overflow-wrap: anywhere;
      font-family: var(--font-mono);
      font-size: var(--text-small-size);
      line-height: var(--text-small-lh);
    }

    @media (max-width: 640px) {
      main {
        padding: var(--space-12) var(--space-6);
      }

      h1 {
        font-size: var(--text-h1-size);
        line-height: var(--text-h1-lh);
      }

      .meta-row {
        grid-template-columns: 1fr;
        gap: var(--space-2);
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Ikigenba connector</p>
    <h1>{{.Service}} is available.</h1>
    <p class="summary">The Gmail connector is running behind the service gateway.</p>
    <dl aria-label="Service metadata">
      <div class="meta-row">
        <dt>Service</dt>
        <dd>{{.Service}}</dd>
      </div>
      <div class="meta-row">
        <dt>Version</dt>
        <dd>{{.Version}}</dd>
      </div>
    </dl>
  </main>
</body>
</html>
