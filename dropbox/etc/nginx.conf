# dropbox — path-routed service location FRAGMENT (NOT a vhost).
#
# Per docs/path-routing-architecture.md the dashboard owns the apex server block,
# the single TLS cert, and the /_authn introspection hook. A service owns nothing
# global: `opsctl setup dropbox` symlinks /etc/nginx/conf.d/locations/dropbox.conf ->
# /opt/dropbox/etc/current/nginx.conf, which the dashboard's apex server block
# includes. No server{}, no cert, no listen.
#
# MOUNT and the loopback PORT are both literal here (MOUNT=/srv/dropbox/, port 3200).
# Per D01/D04 this fragment is authored and shipped VERBATIM, then symlinked live
# by setup — nothing substitutes it, so it must be directly loadable by nginx.

# Unauthenticated PRM bootstrap — NO auth_request. An MCP client with no token
# yet must be able to fetch this RFC 9728 doc to discover the AS. The exact-match
# `=` location wins over the `/srv/dropbox/` prefix below regardless of order, so this
# one path stays open while everything else under the mount is gated.
location = /srv/dropbox/.well-known/oauth-protected-resource {
    proxy_pass http://127.0.0.1:3200/.well-known/oauth-protected-resource;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Defence-in-depth: the loopback byte endpoint (GET /content) must NEVER be
# reachable through the public edge. The handler is already the primary guard —
# it 404s any request carrying an nginx-injected identity header (X-Owner-Email
# or X-Forwarded-Proto), exactly as /feed does (project/design/README.md). This exact-match
# block is belt-and-braces on top of that handler check: it short-circuits the
# public path to 404 before it ever reaches the upstream. The exact `=` location
# wins over the `/srv/dropbox/` prefix below. (/feed ships no such block today and
# is safe purely on its handler check; this is the optional extra layer.)
location = /srv/dropbox/content {
    return 404;
}

# Landing page — human web UI, gated by the dashboard browser SESSION (cookie),
# validated by the dashboard-owned /_session-authn internal location. This exact
# match is distinct from the bearer-gated /srv/dropbox/ prefix below.
location = /srv/dropbox/ {
    auth_request /_session-authn;
    auth_request_set $dropbox_session_owner $upstream_http_x_owner_email;
    proxy_set_header X-Owner-Email $dropbox_session_owner;
    proxy_pass http://127.0.0.1:3200/;   # trailing slash → upstream sees "/"
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Static landing assets — gated by the dashboard browser session just like the
# landing page itself. The trailing slash strips the public mount prefix so the
# upstream receives /static/... paths served by the embedded asset handler.
location /srv/dropbox/static/ {
    auth_request /_session-authn;
    proxy_pass http://127.0.0.1:3200/static/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Authenticated service — every other path under the mount goes through
# auth_request to the dashboard's introspection hook.
location /srv/dropbox/ {
    auth_request /_authn;
    auth_request_set $dropbox_owner  $upstream_http_x_owner_email;
    auth_request_set $dropbox_client $upstream_http_x_client_id;

    # Rate limiting: the introspection endpoint returns 429 when a token is over
    # budget, but auth_request only understands 2xx (allow) and 401/403 (deny) —
    # every other subrequest status, 429 included, is collapsed into a synthetic
    # 500. Capture the real subrequest status (and its Retry-After) and intercept
    # that 500 below to re-emit a faithful 429. error_page only catches
    # nginx-internal 500s (proxy_intercept_errors is off), so a genuine 500 from
    # the dropbox upstream still passes through untouched.
    auth_request_set $authn_status $upstream_status;
    auth_request_set $authn_retry  $upstream_http_retry_after;
    error_page 500 = @dropbox_authn_500;

    # Identity hygiene: `proxy_set_header X-Owner-Email $dropbox_owner;` REPLACES the
    # client's inbound X-Owner-Email entirely on the upstream request. nginx does
    # NOT pass inbound client headers as proxy headers unless explicitly set, and
    # the last proxy_set_header for a name wins. So a single set from the auth
    # subrequest variable is sufficient and safe — a client cannot smuggle
    # identity through.
    proxy_set_header X-Owner-Email $dropbox_owner;
    proxy_set_header X-Client-Id  $dropbox_client;

    proxy_pass http://127.0.0.1:3200/;   # trailing slash strips the /srv/dropbox/ mount
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Reached only when auth_request collapsed a non-allow/deny subrequest status to
# 500. If the introspection endpoint actually said 429 (rate limited), surface
# that faithfully with its Retry-After; otherwise it was a real internal error.
location @dropbox_authn_500 {
    if ($authn_status = 429) {
        add_header Retry-After $authn_retry always;
        return 429;
    }
    return 500;
}
