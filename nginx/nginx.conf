# ~/projects/nginx/nginx.conf — dev front door for the ikigenba suite.
#
# Run unprivileged, in the foreground:
#   ./run        (or: nginx -p ~/projects/nginx -c ~/projects/nginx/nginx.conf -g 'daemon off;')
#
# This mirrors the prod apex server block (dashboard/etc/nginx.conf) MINUS TLS:
# plain http on :8080, so `localhost:8080/...` behaves like `int.ikigenba.com/...`.
# apache2 owns :80 on this box, so we use a high port and keep all writable state
# (pid, logs, temp) under this prefix — no root, no system /etc/nginx involved.
#
# Proxies `/` -> dashboard:3000, exposes the dashboard-owned `/_authn`
# introspection hook (internal-only), and includes the per-service `/srv/<svc>/`
# fragments services drop into locations/ — just like prod's
# /etc/nginx/conf.d/locations/.

worker_processes  1;
pid               nginx.pid;
# Foreground dev: stream logs to the terminal. error_log -> stderr (startup +
# runtime errors), access_log -> stdout (one line per request, below).
error_log         /dev/stderr info;

events {
    worker_connections  256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log    /dev/stdout;

    # Keep all scratch under the project prefix so nginx needs no privileged
    # paths. nginx creates these dirs on startup.
    client_body_temp_path  tmp/client_body;
    proxy_temp_path        tmp/proxy;
    fastcgi_temp_path      tmp/fastcgi;
    uwsgi_temp_path        tmp/uwsgi;
    scgi_temp_path         tmp/scgi;

    sendfile           on;
    keepalive_timeout  65;

    server {
        listen      8080;
        listen      [::]:8080;
        server_name localhost;

        # Dashboard-owned introspection hook. Every /srv/<svc>/ fragment issues
        # an auth_request subrequest to this internal location; nginx forwards
        # the client's Authorization header automatically and we add the only
        # resource hint the dashboard needs: X-Original-URI. Body is dropped so
        # the subrequest is a cheap loopback HEAD-like call. `internal;` makes it
        # unreachable from outside — it only serves auth_request subrequests.
        location = /_authn {
            internal;
            proxy_pass              http://127.0.0.1:3000/internal/authn;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
        }

        # Path-routed service fragments land here in Phase 2b (e.g. crm.conf).
        # A zero-match wildcard include is not an error in nginx.
        include locations/*.conf;

        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            # http locally -> app sees "http", so cookies are non-Secure and HSTS
            # is off, exactly as on plain-http localhost today.
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
