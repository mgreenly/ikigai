# wiki — path-routed service location FRAGMENT (NOT a vhost).
#
# Per docs/path-routing-architecture.md the dashboard owns the apex server block,
# the single TLS cert, and the /_authn introspection hook. A service owns nothing
# global: `opsctl setup wiki` symlinks /etc/nginx/conf.d/locations/wiki.conf ->
# /opt/wiki/etc/current/nginx.conf, which the dashboard's apex server block
# includes. No server{}, no cert, no listen.
#
# MOUNT and the loopback PORT are both literal here (MOUNT=/srv/wiki/, port 3001).
# Per D01/D04 this fragment is authored and shipped VERBATIM, then symlinked live
# by setup — nothing substitutes it, so it must be directly loadable by nginx.

# Unauthenticated PRM bootstrap — NO auth_request. An MCP client with no token
# yet must be able to fetch this RFC 9728 doc to discover the AS. The exact-match
# `=` location wins over the `/srv/wiki/` prefix below regardless of order, so this
# one path stays open while everything else under the mount is gated.
location = /srv/wiki/.well-known/oauth-protected-resource {
    proxy_pass http://127.0.0.1:3001/.well-known/oauth-protected-resource;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Landing page — human web UI, gated by the dashboard browser SESSION (cookie),
# validated by the dashboard-owned /_session-authn internal location (sibling of
# /_authn). Exact-match `=` so it never shadows the gated prefix below or the MCP
# endpoint. A failed session check yields 401.
location = /srv/wiki/ {
    auth_request /_session-authn;
    auth_request_set $wiki_owner $upstream_http_x_owner_email;
    proxy_set_header X-Owner-Email $wiki_owner;
    proxy_pass http://127.0.0.1:3001/;   # trailing slash → upstream sees "/"
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Subject pages — human web UI, gated by the dashboard browser SESSION (cookie).
# The upstream path keeps the subject prefix so nested page routes are preserved.
location /srv/wiki/subject/ {
    auth_request /_session-authn;
    auth_request_set $wiki_owner $upstream_http_x_owner_email;
    proxy_set_header X-Owner-Email $wiki_owner;
    proxy_pass http://127.0.0.1:3001/subject/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Static assets for the human web UI, gated by the dashboard browser SESSION.
location /srv/wiki/static/ {
    auth_request /_session-authn;
    proxy_pass http://127.0.0.1:3001/static/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Authenticated service — every other path under the mount goes through
# auth_request to the dashboard's introspection hook.
location /srv/wiki/ {
    auth_request /_authn;
    auth_request_set $wiki_owner  $upstream_http_x_owner_email;
    auth_request_set $wiki_client $upstream_http_x_client_id;

    # Rate limiting: the introspection endpoint returns 429 when a token is over
    # budget, but auth_request only understands 2xx (allow) and 401/403 (deny) —
    # every other subrequest status, 429 included, is collapsed into a synthetic
    # 500. Capture the real subrequest status (and its Retry-After) and intercept
    # that 500 below to re-emit a faithful 429. error_page only catches
    # nginx-internal 500s (proxy_intercept_errors is off), so a genuine 500 from
    # the wiki upstream still passes through untouched.
    auth_request_set $authn_status $upstream_status;
    auth_request_set $authn_retry  $upstream_http_retry_after;
    error_page 500 = @wiki_authn_500;

    # Identity hygiene: `proxy_set_header X-Owner-Email $wiki_owner;` REPLACES the
    # client's inbound X-Owner-Email entirely on the upstream request. nginx does
    # NOT pass inbound client headers as proxy headers unless explicitly set, and
    # the last proxy_set_header for a name wins. So a single set from the auth
    # subrequest variable is sufficient and safe — a client cannot smuggle
    # identity through.
    proxy_set_header X-Owner-Email $wiki_owner;
    proxy_set_header X-Client-Id  $wiki_client;

    proxy_pass http://127.0.0.1:3001/;   # trailing slash strips the /srv/wiki/ mount
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Reached only when auth_request collapsed a non-allow/deny subrequest status to
# 500. If the introspection endpoint actually said 429 (rate limited), surface
# that faithfully with its Retry-After; otherwise it was a real internal error.
location @wiki_authn_500 {
    if ($authn_status = 429) {
        add_header Retry-After $authn_retry always;
        return 429;
    }
    return 500;
}
