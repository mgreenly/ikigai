<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Service}} - notify</title>
  <link rel="stylesheet" href="{{.AssetPath}}">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
    }
    main {
      width: min(880px, calc(100% - 48px));
      margin: 0 auto;
      padding: 96px 0;
    }
    .eyebrow {
      color: var(--color-text-muted);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    h1 {
      margin: 20px 0 24px;
      font-family: var(--font-display);
      font-size: clamp(42px, 8vw, 76px);
      line-height: 1.04;
      letter-spacing: 0;
    }
    p {
      max-width: 620px;
      color: var(--color-text-muted);
      font-size: 19px;
      line-height: 1.6;
    }
    dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 10px 18px;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--color-border);
      font-family: var(--font-mono);
      font-size: 14px;
    }
    dt {
      color: var(--color-text-muted);
    }
    dd {
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Notification service</div>
    <h1>{{.Service}}</h1>
    <p>Push notifications for suite events are active through this service endpoint.</p>
    <dl>
      <dt>Service</dt>
      <dd>{{.Service}}</dd>
      <dt>Version</dt>
      <dd>{{.Version}}</dd>
    </dl>
  </main>
</body>
</html>
