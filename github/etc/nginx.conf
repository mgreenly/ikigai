# github — path-routed service location FRAGMENT (NOT a vhost).
#
# MOUNT and the loopback PORT are both literal here (MOUNT=/srv/github/, port 3203).

# Unauthenticated PRM bootstrap — NO auth_request. An MCP client with no token
# yet must be able to fetch this RFC 9728 doc to discover the AS.
location = /srv/github/.well-known/oauth-protected-resource {
    proxy_pass http://127.0.0.1:3203/.well-known/oauth-protected-resource;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Loopback-private PR route must never be reachable through the public front door.
location = /srv/github/pr { return 404; }

# Landing page — human web UI, gated by the dashboard browser SESSION cookie.
location = /srv/github/ {
    auth_request /_session-authn;
    error_page 401 = @login_bounce;
    auth_request_set $github_session_owner $upstream_http_x_owner_email;
    proxy_set_header X-Owner-Email $github_session_owner;
    proxy_pass http://127.0.0.1:3203/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Static landing assets — gated by the dashboard browser SESSION cookie.
location /srv/github/static/ {
    auth_request /_session-authn;
    error_page 401 = @login_bounce;
    proxy_pass http://127.0.0.1:3203/static/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Authenticated service — every other path under the mount goes through
# auth_request to the dashboard's introspection hook.
location /srv/github/ {
    auth_request /_authn;
    auth_request_set $github_owner  $upstream_http_x_owner_email;
    auth_request_set $github_client $upstream_http_x_client_id;

    auth_request_set $authn_status $upstream_status;
    auth_request_set $authn_retry  $upstream_http_retry_after;
    error_page 500 = @github_authn_500;

    proxy_set_header X-Owner-Email $github_owner;
    proxy_set_header X-Client-Id  $github_client;

    proxy_pass http://127.0.0.1:3203/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
}

# Reached only when auth_request collapsed a non-allow/deny subrequest status to
# 500. If the introspection endpoint actually said 429, surface that faithfully.
location @github_authn_500 {
    if ($authn_status = 429) {
        add_header Retry-After $authn_retry always;
        return 429;
    }
    return 500;
}
