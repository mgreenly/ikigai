<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>github · github</title>
  <link rel="preload" as="font" type="font/woff2" crossorigin href="static/fonts/space-grotesk.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin href="static/fonts/ibm-plex-sans.woff2">
  <link rel="stylesheet" href="static/tokens.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--color-text);
      background: var(--color-bg);
      font-family: var(--font-body);
      display: flex;
      justify-content: center;
    }

    main {
      width: min(100% - (var(--layout-gutter) * 2), 880px);
      padding: var(--space-16) 0;
    }

    .home {
      position: fixed;
      top: var(--space-6);
      left: var(--space-6);
      z-index: var(--z-sticky);
      display: inline-flex;
      align-items: center;
      min-height: var(--control-h-md);
      color: var(--color-text-muted);
      font-family: var(--font-mono);
      font-size: var(--text-small-size);
      line-height: var(--text-small-lh);
      text-decoration: none;
    }

    .home:hover {
      color: var(--color-text);
    }

    .eyebrow {
      margin: var(--space-16) 0 var(--space-6);
      color: var(--color-accent);
      font-family: var(--font-mono);
      font-size: var(--text-label-size);
      font-weight: var(--text-label-weight);
      line-height: var(--text-label-lh);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(var(--text-display-size), 10vw, 112px);
      font-weight: var(--text-display-weight);
      line-height: .88;
      letter-spacing: 0;
    }

    .description {
      max-width: 760px;
      margin: var(--space-8) 0 0;
      color: var(--color-text-muted);
      font-size: var(--text-body-lg-size);
      font-weight: var(--text-body-lg-weight);
      line-height: var(--text-body-lg-lh);
    }

    dl {
      margin: var(--space-16) 0 0;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-top: var(--border-width) solid var(--color-border);
      border-bottom: var(--border-width) solid var(--color-border);
      font-size: var(--text-body-size);
      line-height: var(--text-body-lh);
    }

    .detail {
      padding: var(--space-6);
      border-left: var(--border-width) solid var(--color-border);
    }

    .detail:first-child {
      border-left: 0;
      padding-left: 0;
    }

    dt {
      color: var(--color-text-muted);
      font-size: var(--text-label-size);
      font-weight: var(--text-label-weight);
      line-height: var(--text-label-lh);
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    dd {
      margin: var(--space-2) 0 0;
      font-family: var(--font-mono);
      overflow-wrap: anywhere;
    }

    code {
      font: inherit;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - (var(--space-6) * 2), 880px);
        padding: var(--space-12) 0;
      }

      .home {
        top: var(--space-4);
        left: var(--space-4);
      }

      .eyebrow {
        margin-top: var(--space-16);
      }

      dl {
        grid-template-columns: 1fr;
      }

      .detail,
      .detail:first-child {
        padding: var(--space-6) 0;
        border-left: 0;
        border-top: var(--border-width) solid var(--color-border);
      }

      .detail:first-child {
        border-top: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    <a class="home" href="/">Home</a>
    <p class="eyebrow">GitHub connector</p>
    <h1>github</h1>
    <p class="description">Github connects the suite to GitHub through one shared GitHub App and exposes repository, pull request, and issue actions as MCP tools.</p>
    <dl>
      <div class="detail">
        <dt>Service</dt>
        <dd>github</dd>
      </div>
      <div class="detail">
        <dt>Version</dt>
        <dd>v-test</dd>
      </div>
      <div class="detail">
        <dt>API</dt>
        <dd><code>POST /mcp</code></dd>
      </div>
    </dl>
  </main>
</body>
</html>
