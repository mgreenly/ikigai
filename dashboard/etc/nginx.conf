# managed by dashboard/bin/setup — placeholders substituted at install time.
#   __DOMAIN__ = apex account domain   (e.g. int.ikigenba.com)
#   __PORT__   = dashboard loopback port (from etc/manifest.env)
#
# The dashboard is the DEFAULT/apex app. Per docs/path-routing-architecture.md it
# owns the single apex server block, the one apex TLS cert (HTTP-01 webroot), the
# ACME-challenge location, the dashboard-owned /_authn introspection hook, and
# the conf.d/locations/ include where path-routed services drop their fragments.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type "text/plain";
    }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_timeout 1d;

    # HSTS is set by the app (internal/server/headers.go) — gated on the
    # X-Forwarded-Proto we pass below — so nginx does not duplicate it here.

    # Dashboard-owned introspection hook. Every /srv/<svc>/ service fragment
    # issues an auth_request subrequest here; nginx forwards the client's
    # Authorization header automatically and we add the only resource hint the
    # dashboard needs: X-Original-URI. Body is dropped (cheap loopback call).
    # `internal;` makes it unreachable from outside — auth_request subrequests
    # only. The dashboard owns this location; services never author it.
    location = /_authn {
        internal;
        proxy_pass              http://127.0.0.1:__PORT__/internal/authn;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
    }

    # Session-cookie introspection for the `sites` PRIVATE static tier. Sibling
    # of /_authn but cookie-based: nginx forwards the browser's Cookie header
    # automatically, and the dashboard reads `dashboard_session` from it. Any
    # valid logged-in dashboard session may view any private site. `internal;`
    # makes it reachable only via auth_request subrequests.
    location = /_session-authn {
        internal;
        proxy_pass              http://127.0.0.1:__PORT__/internal/session-authn;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
    }

    # Path-routed service location fragments land here (Phase 2b; e.g. crm.conf).
    # A zero-match wildcard include is not an error in nginx.
    include /etc/nginx/conf.d/locations/*.conf;

    location / {
        proxy_pass         http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
